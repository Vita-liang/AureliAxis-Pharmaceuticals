<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bannerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5D9CEC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E6F2FF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bannerGradient)"/>
  
  <!-- Abstract Pattern -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="80" fill="white"/>
    <circle cx="1100" cy="300" r="120" fill="white"/>
    <circle cx="600" cy="50" r="60" fill="white"/>
    <circle cx="300" cy="350" r="100" fill="white"/>
    <circle cx="900" cy="150" r="70" fill="white"/>
  </g>
  
  <!-- DNA Helix Pattern -->
  <g transform="translate(200, 200)" opacity="0.15">
    <path d="M-100 -150 Q-150 -75 -100 0 Q-50 75 -100 150" stroke="white" stroke-width="4" fill="none"/>
    <path d="M100 -150 Q150 -75 100 0 Q50 75 100 150" stroke="white" stroke-width="4" fill="none"/>
    <line x1="-80" y1="-100" x2="80" y2="-100" stroke="white" stroke-width="2"/>
    <line x1="-60" y1="-50" x2="60" y2="-50" stroke="white" stroke-width="2"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="white" stroke-width="2"/>
    <line x1="-60" y1="50" x2="60" y2="50" stroke="white" stroke-width="2"/>
    <line x1="-80" y1="100" x2="80" y2="100" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Medical Cross Pattern -->
  <g transform="translate(1000, 200)" opacity="0.1">
    <rect x="-30" y="-80" width="60" height="160" fill="white"/>
    <rect x="-80" y="-30" width="160" height="60" fill="white"/>
  </g>
  
  <!-- Main Content Area -->
  <g transform="translate(600, 200)">
    <!-- Company Logo -->
    <g transform="translate(-400, -80)">
      <path d="M40 10 L70 80 L55 80 L48 63 L22 63 L15 80 L0 80 L30 10 L40 10 Z M35 25 L25 50 L45 50 L35 25 Z" fill="white"/>
      <text x="90" y="50" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="white">AureliAxis</text>
      <text x="90" y="75" font-family="Noto Sans SC, Arial, sans-serif" font-size="18" font-weight="500" fill="white" opacity="0.9">奥瑞立科医药</text>
    </g>
    
    <!-- Tagline -->
    <text x="0" y="20" font-family="Noto Sans SC, Arial, sans-serif" font-size="28" font-weight="500" fill="white" text-anchor="middle">创新驱动健康，科技引领未来</text>
    <text x="0" y="60" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="white" text-anchor="middle" opacity="0.9">Innovation Drives Health, Technology Leads the Future</text>
    
    <!-- Decorative Line -->
    <line x1="-200" y1="90" x2="200" y2="90" stroke="white" stroke-width="2" opacity="0.5"/>
    
    <!-- Key Values -->
    <g transform="translate(0, 130)">
      <text x="-250" y="0" font-family="Noto Sans SC, Arial, sans-serif" font-size="14" font-weight="500" fill="white" text-anchor="middle" opacity="0.9">创新研发</text>
      <text x="0" y="0" font-family="Noto Sans SC, Arial, sans-serif" font-size="14" font-weight="500" fill="white" text-anchor="middle" opacity="0.9">精准医疗</text>
      <text x="250" y="0" font-family="Noto Sans SC, Arial, sans-serif" font-size="14" font-weight="500" fill="white" text-anchor="middle" opacity="0.9">患者至上</text>
    </g>
  </g>
  
  <!-- Product Icons -->
  <g transform="translate(100, 320)" opacity="0.8">
    <circle cx="0" cy="0" r="25" fill="white" opacity="0.2"/>
    <text x="0" y="5" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">AureliMab™</text>
  </g>
  
  <g transform="translate(600, 350)" opacity="0.8">
    <circle cx="0" cy="0" r="25" fill="white" opacity="0.2"/>
    <text x="0" y="5" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">LymphoAxis™</text>
  </g>
  
  <g transform="translate(1100, 320)" opacity="0.8">
    <circle cx="0" cy="0" r="25" fill="white" opacity="0.2"/>
    <text x="0" y="5" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">CardioAureli™</text>
  </g>
</svg>