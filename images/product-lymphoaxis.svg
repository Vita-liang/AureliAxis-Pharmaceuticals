<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="lymphoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B42A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#lymphoGradient)" opacity="0.1"/>
  
  <!-- Lymph Node Structure -->
  <g transform="translate(100, 100)">
    <!-- Central Node -->
    <circle cx="0" cy="0" r="25" fill="url(#lymphoGradient)" opacity="0.3"/>
    <circle cx="0" cy="0" r="15" fill="#00B42A"/>
    
    <!-- Satellite Nodes -->
    <circle cx="-40" cy="-40" r="12" fill="#4CAF50" opacity="0.8"/>
    <circle cx="40" cy="-40" r="12" fill="#4CAF50" opacity="0.8"/>
    <circle cx="-40" cy="40" r="12" fill="#4CAF50" opacity="0.8"/>
    <circle cx="40" cy="40" r="12" fill="#4CAF50" opacity="0.8"/>
    
    <!-- Connection Lines -->
    <line x1="0" y1="0" x2="-40" y2="-40" stroke="#00B42A" stroke-width="3" opacity="0.6"/>
    <line x1="0" y1="0" x2="40" y2="-40" stroke="#00B42A" stroke-width="3" opacity="0.6"/>
    <line x1="0" y1="0" x2="-40" y2="40" stroke="#00B42A" stroke-width="3" opacity="0.6"/>
    <line x1="0" y1="0" x2="40" y2="40" stroke="#00B42A" stroke-width="3" opacity="0.6"/>
    
    <!-- Cross Connections -->
    <line x1="-40" y1="-40" x2="40" y2="-40" stroke="#4CAF50" stroke-width="2" opacity="0.4"/>
    <line x1="-40" y1="40" x2="40" y2="40" stroke="#4CAF50" stroke-width="2" opacity="0.4"/>
    <line x1="-40" y1="-40" x2="-40" y2="40" stroke="#4CAF50" stroke-width="2" opacity="0.4"/>
    <line x1="40" y1="-40" x2="40" y2="40" stroke="#4CAF50" stroke-width="2" opacity="0.4"/>
    
    <!-- Target Crosshair -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#0A3D62" stroke-width="2" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Product Label -->
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0A3D62" text-anchor="middle">LymphoAxis™</text>
</svg>