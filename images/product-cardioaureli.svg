<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="cardioGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7D00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#cardioGradient)" opacity="0.1"/>
  
  <!-- Heart with ECG -->
  <g transform="translate(100, 100)">
    <!-- Heart Shape -->
    <path d="M0 30 C-30 10 -50 -20 0 -50 C50 -20 30 10 0 30 Z" 
          fill="url(#cardioGradient)" opacity="0.3"/>
    <path d="M0 25 C-25 8 -40 -15 0 -40 C40 -15 25 8 0 25 Z" 
          fill="#FF7D00"/>
    
    <!-- ECG Line -->
    <polyline points="-60,0 -40,0 -30,-20 -20,20 -10,0 10,0 20,-15 30,15 40,0 60,0" 
              fill="none" stroke="#0A3D62" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Pulse Points -->
    <circle cx="-30" cy="-20" r="4" fill="#FF9800"/>
    <circle cx="20" cy="-15" r="4" fill="#FF9800"/>
    <circle cx="30" cy="15" r="4" fill="#FF9800"/>
    
    <!-- Shield Protection -->
    <path d="M-50 -50 L50 -50 L50 10 L0 50 L-50 10 Z" 
          fill="none" stroke="#0A3D62" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Product Label -->
  <text x="100" y="180" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0A3D62" text-anchor="middle">CardioAureli™</text>
</svg>